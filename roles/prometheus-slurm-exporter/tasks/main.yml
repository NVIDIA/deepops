---
- name: create config dir
  file:
    path: "{{ prometheus_config_dir }}"
    state: directory
    mode: "0755"

- name: create endpoints config dir
  file:
    path: "{{ prometheus_cfg_endpoint_dir }}"
    state: directory
    mode: "0755"

- name: install config file
  template:
    src: "{{ slurm_exporter_conf_template }}"
    dest: "{{ prometheus_cfg_endpoint_dir }}/slurm-exporter.yml"
    owner: root
    group: root
    mode: 0644

- name: create data dir
  file:
    path: "{{ grafana_data_dir }}"
    state: directory
    owner: "{{ grafana_user_id }}"
    mode: "0755"

- name: create dashboard dir
  file:
    path: "{{ grafana_cfg_dashboard_path }}"
    state: directory
    owner: "{{ grafana_user_id }}"
    mode: "0755"

- name: copy dashboards
  copy:
    src: "{{ item }}"
    dest: "{{ grafana_cfg_dashboard_path }}"
    owner: "{{ grafana_user_id }}"
    mode: "0644"
  with_items:
    - slurm-dashboard.json
  notify: restart grafana

- name: create image build dir
  file:
    path: "{{ slurm_exporter_build_dir }}"
    state: directory
    mode: "0755"
  when: slurm_exporter_build_image

- name: copy image build context
  copy:
    src: docker/Dockerfile
    dest: "{{ slurm_exporter_build_dir }}/Dockerfile"
    mode: "0644"
  register: slurm_exporter_dockerfile
  when: slurm_exporter_build_image

- name: copy exporter source
  copy:
    src: exporter/
    dest: "{{ slurm_exporter_build_dir }}/exporter/"
    mode: "0644"
  register: slurm_exporter_source
  when: slurm_exporter_build_image

- name: check for existing exporter image
  command: docker image inspect {{ slurm_exporter_container }}
  register: slurm_exporter_image_check
  failed_when: false
  changed_when: false
  when: slurm_exporter_build_image

- name: build exporter image
  command: docker build -t {{ slurm_exporter_container }} {{ slurm_exporter_build_dir }}
  when: >
    slurm_exporter_build_image and
    (slurm_exporter_image_check.rc != 0 or slurm_exporter_dockerfile.changed or slurm_exporter_source.changed)
  notify: restart slurm-exporter

- name: install systemd unit file
  template:
    src: templates/docker.slurm-exporter.service.j2
    dest: "/etc/systemd/system/{{ slurm_exporter_svc_name }}"
    owner: root
    group: root
    mode: 0644
  notify: restart slurm-exporter

- name: configure service
  systemd:
    name: "{{ slurm_exporter_svc_name }}"
    state: "{{ slurm_exporter_state }}"
    enabled: "{{ slurm_exporter_enabled }}"
    daemon_reload: yes
  notify: restart slurm-exporter
